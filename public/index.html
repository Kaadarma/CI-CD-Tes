<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator - CI/CD Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 400px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #555; margin-bottom: 0.25rem; }
    input, select {
      width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #6366f1; }
    .row { display: flex; gap: 0.75rem; }
    .row .form-group { flex: 1; }
    button {
      width: 100%; padding: 0.75rem; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .result-box {
      margin-top: 1.25rem; padding: 1rem; border-radius: 8px;
      font-size: 1.125rem; font-weight: 600; text-align: center;
      display: none;
    }
    .result-box.success { display: block; background: #e0f7e9; color: #0a6e3d; }
    .result-box.error { display: block; background: #fee2e2; color: #991b1b; }
    .badge {
      text-align: center; margin-top: 1rem; font-size: 0.75rem; color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧮 Calculator</h1>
    <div class="row">
      <div class="form-group">
        <label for="a">Number A</label>
        <input type="number" id="a" step="any" value="10">
      </div>
      <div class="form-group">
        <label for="b">Number B</label>
        <input type="number" id="b" step="any" value="5">
      </div>
    </div>
    <div class="form-group">
      <label for="op">Operation</label>
      <select id="op">
        <option value="add">Add (+)</option>
        <option value="subtract">Subtract (−)</option>
        <option value="multiply">Multiply (×)</option>
        <option value="divide">Divide (÷)</option>
      </select>
    </div>
    <button id="calculate">Hitung</button>
    <div id="result" class="result-box"></div>
    <div class="badge">CI/CD Demo — Express + Vercel</div>
  </div>
  <script>
    document.getElementById("calculate").addEventListener("click", async () => {
      const a = document.getElementById("a").value;
      const b = document.getElementById("b").value;
      const op = document.getElementById("op").value;
      const resultBox = document.getElementById("result");

      resultBox.className = "result-box";
      resultBox.textContent = "Loading...";
      resultBox.style.display = "block";

      try {
        const res = await fetch(`/api/calculator?op=${op}&a=${a}&b=${b}`);
        const data = await res.json();

        if (!res.ok) {
          resultBox.className = "result-box error";
          resultBox.textContent = `Error: ${data.error}`;
        } else {
          resultBox.className = "result-box success";
          resultBox.textContent = `Result: ${data.result}`;
        }
      } catch (err) {
        resultBox.className = "result-box error";
        resultBox.textContent = `Error: ${err.message}`;
      }
    });

    document.getElementById("calculate").click();
  </script>
</body>
</html>
